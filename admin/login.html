<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 龙翔电气</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-page" id="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>龙翔电气 <span style="color:#D4A843;">后台</span></h1>
                    <p>登录后管理网站内容</p>
                </div>
                <div class="login-error" id="login-error"></div>
                <form class="login-form" id="login-form">
                    <div class="form-group">
                        <label for="login-username">用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-login" id="btn-login">登录</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
